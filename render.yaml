# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: vauto-api
    runtime: docker
    plan: starter
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vauto-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@vauto.lt
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        value: admin@vauto.com
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_ORIGIN
        value: https://www.vauto.lt
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_AUTO_WEBHOOK
        value: "1"
      - key: PUBLIC_API_URL
        value: https://vauto-api.onrender.com
      - key: API_RATE_LIMIT_PER_MIN
        value: "300"
      - key: ACTION_RATE_LIMIT_PER_MIN
        value: "120"
      - key: AI_RATE_LIMIT_PER_MIN
        value: "30"
      - key: SEARCH_RATE_LIMIT_PER_MIN
        value: "40"
      - key: GOOGLE_CLOUD_VISION_CREDENTIALS_JSON
        sync: false
      - key: TESSERACT_OCR_ENABLED
        value: "0"
      - key: PHOTOROOM_API_KEY
        sync: false
      - key: CLIPDROP_API_KEY
        sync: false
      - key: REMOVEBG_API_KEY
        sync: false
      - key: OMNIVA_API_KEY
        sync: false
      - key: OMNIVA_API_URL
        sync: false
      - key: DPD_API_KEY
        sync: false
      - key: DPD_API_URL
        sync: false
      - key: REGITRA_PLATE_API_USERNAME
        sync: false
      - key: REGITRA_PLATE_API_PASSWORD
        sync: false
      - key: VAUTO_OPS_SECRET
        sync: false

databases:
  - name: vauto-db
    plan: free
    region: frankfurt
    databaseName: vauto
    user: vauto
