# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: vauto-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vauto-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "4000"

databases:
  - name: vauto-db
    plan: free
    databaseName: vauto
    user: vauto
