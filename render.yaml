# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: vauto-api
    runtime: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vauto-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@vauto.lt
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: vauto-db
    plan: free
    region: frankfurt
    databaseName: vauto
    user: vauto
