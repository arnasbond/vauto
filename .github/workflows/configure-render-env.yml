name: Configure Render env

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set Render env and redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d8q3fk6q1p3s739fd9h0
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REGITRA_PLATE_API_USERNAME: ${{ secrets.REGITRA_PLATE_API_USERNAME }}
          REGITRA_PLATE_API_PASSWORD: ${{ secrets.REGITRA_PLATE_API_PASSWORD }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY not set"
            exit 1
          fi
          node scripts/configure-render-env.mjs

      - name: Sync Vercel env (Gemini only)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/configure-vercel-env.mjs

      - name: Wait for API health
        run: |
          URL="https://vauto-api.onrender.com/api/ai/health"
          for i in $(seq 1 30); do
            BODY=$(curl -sf "$URL" || true)
            echo "$BODY"
            if echo "$BODY" | grep -q '"gemini":true'; then
              echo "AI health: gemini=true"
              exit 0
            fi
            if echo "$BODY" | grep -q '"provider":"gemini"'; then
              echo "AI health: provider=gemini (legacy schema)"
              exit 0
            fi
            echo "Attempt $i/30 — waiting…"
            sleep 20
          done
          echo "AI health check timed out"
          exit 1

      - name: Smoke test AI health
        run: |
          for i in $(seq 1 15); do
            BODY=$(curl -sf "https://vauto-api.onrender.com/api/ai/health" || true)
            echo "AI health: ${BODY:0:200}"
            if echo "$BODY" | grep -q '"gemini":true'; then
              exit 0
            fi
            echo "Attempt $i/15 — waiting…"
            sleep 15
          done
          echo "AI health check failed"
          exit 1
