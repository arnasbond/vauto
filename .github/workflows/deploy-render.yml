name: Deploy Render API

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - "api/ai/**"
      - "render.yaml"
      - "scripts/redeploy-render.mjs"
      - "scripts/configure-render-env.mjs"
      - "scripts/verify-health.mjs"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d8q3fk6q1p3s739fd9h0
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY not set — skipping Render deploy"
            exit 0
          fi
          node scripts/redeploy-render.mjs

      - name: Wait for API health
        run: |
          BASE="https://vauto-api.onrender.com"
          for i in $(seq 1 45); do
            CODE=$(curl -s -o /tmp/as.json -w "%{http_code}" -X POST "$BASE/api/ai/analyze-search" \
              -H "Content-Type: application/json" \
              -d '{"query":"kas parduoda rubus","userCity":"Vilnius"}' || echo "000")
            echo "analyze-search HTTP $CODE: $(head -c 200 /tmp/as.json 2>/dev/null || true)"
            if [ "$CODE" = "200" ]; then
              echo "analyze-search live"
              exit 0
            fi
            echo "Attempt $i/45 — waiting for deploy…"
            sleep 20
          done
          echo "analyze-search not ready after deploy wait"
          exit 1

      - name: Verify AI routes
        run: node scripts/verify-health.mjs --strict-analyze-search

      - name: Verify listings count
        run: |
          COUNT=$(curl -sf "https://vauto-api.onrender.com/api/listings" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).length))")
          echo "Listings on API: $COUNT"

      - name: Bootstrap catalog and embeddings
        run: |
          for i in $(seq 1 12); do
            RESP=$(curl -s -w "\n%{http_code}" -X POST "https://vauto-api.onrender.com/api/bootstrap" || true)
            CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Bootstrap attempt $i/12 — HTTP $CODE: $BODY"
            HEALTH=$(curl -sf "https://vauto-api.onrender.com/api/health" || echo '{}')
            echo "$HEALTH" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try {
                  const h=JSON.parse(d);
                  const e=h.embeddings||{};
                  console.log('Embeddings:', JSON.stringify(e));
                  const text=Number(e.textIndexed||0);
                  const image=Number(e.imageIndexed||0);
                  if (text>0 && image>=text) process.exit(0);
                  if (text===0) process.exit(0);
                  process.exit(1);
                } catch { process.exit(1); }
              });
            " && exit 0
            echo "Waiting for Render deploy + embedding sync…"
            sleep 30
          done
          echo "Bootstrap finished (embeddings may sync on next deploy)"
          curl -sf "https://vauto-api.onrender.com/api/health" || true
