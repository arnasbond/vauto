name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime config (API URL baked into bundled assets)
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

      - name: Build web app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

      - name: Verify static export for Capacitor
        run: |
          test -f out/index.html
          test -f out/runtime-config.json
          grep -q vauto-api.onrender.com out/runtime-config.json
          echo "Static export OK ($(find out -type f | wc -l) files)"

      - name: Sync Capacitor Android (bundled assets — stable like vauto.vercel.apk)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare release assets
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk vauto.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk vauto.vercel.apk
          mkdir -p out/download
          cp vauto.apk out/download/vauto.apk
          cp vauto.apk out/download/vauto.vercel.apk

      - name: Deploy APK mirror to Vercel
        run: |
          npm install -g vercel@latest
          mkdir -p .vercel/output/static
          cp -r out/. .vercel/output/static/
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('vercel.json','utf8'));
            const routes = [];
            for (const r of v.rewrites || []) {
              routes.push({ src: r.source, dest: r.destination });
            }
            for (const r of v.redirects || []) {
              routes.push({ src: r.source, dest: r.destination, status: r.permanent ? 308 : 307 });
            }
            routes.push({ handle: 'filesystem' });
            fs.writeFileSync('.vercel/output/config.json', JSON.stringify({ version: 3, routes }, null, 2));
          "
          test -f .vercel/output/static/download/vauto.apk
          mkdir -p .vercel
          printf '%s\n' \
            '{' \
            "  \"projectId\": \"${{ secrets.VERCEL_PROJECT_ID }}\"," \
            "  \"orgId\": \"${{ secrets.VERCEL_ORG_ID }}\"," \
            '  "settings": {' \
            '    "framework": null,' \
            '    "buildCommand": null,' \
            '    "outputDirectory": "out"' \
            '  }' \
            '}' > .vercel/project.json
          vercel deploy --prebuilt --prod --yes --archive=tgz --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Delete previous android-latest release
        continue-on-error: true
        run: gh release delete android-latest --yes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Vauto Android APK
          body: |
            **v1.0.9** — Fix begalinis APK atsisiuntimas: Vercel /download/ mirror, blokuojamas WebView DownloadManager.

            **Rekomenduojama nuoroda:** https://vauto-chi.vercel.app/download/vauto.apk

            UI įdėtas į APK — prisijungimas nebe priklauso nuo nuotolinio Vercel shell.

            1. Atsisiųskite **vauto.apk** arba **vauto.vercel.apk** (tas pats failas)
            2. Atidarykite atsisiųstą APK
            3. Jei prašo — leiskite diegimą iš nežinomų šaltinių
            4. Paleiskite programėlę „Vauto“
            5. **Ištrinkite senesnę versiją** prieš diegiant
          files: |
            vauto.apk
            vauto.vercel.apk
          make_latest: true

      - uses: actions/upload-artifact@v4
        with:
          name: vauto-apk
          path: vauto.apk
          retention-days: 30
