name: Deploy to Vercel

# Vercel deploys automatically via GitHub integration (vauto-chi.vercel.app).
# This workflow validates production build with API URL baked in.

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime config from secrets
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Lint
        run: npm run lint

      - name: Production build (with API URL)
        run: npm run build

      - name: Verify runtime config
        run: |
          test -f public/runtime-config.json
          grep -q vauto-api.onrender.com public/runtime-config.json
          echo "NEXT_PUBLIC_API_URL and runtime-config.json OK"

      - name: Verify Render API health
        run: npm run verify:health
        continue-on-error: true
