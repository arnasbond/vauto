name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime config from secrets
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Lint
        run: npm run lint

      - name: Production build (with API URL)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Verify build output
        run: |
          test -f public/runtime-config.json
          grep -q vauto-api.onrender.com public/runtime-config.json
          test -f out/admin/ai/index.html
          test -f out/profile/index.html
          echo "Build OK"

      - name: Verify Render API health
        run: npm run verify:health
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project (static export)
        run: |
          mkdir -p .vercel
          printf '%s\n' \
            '{' \
            "  \"projectId\": \"${{ secrets.VERCEL_PROJECT_ID }}\"," \
            "  \"orgId\": \"${{ secrets.VERCEL_ORG_ID }}\"," \
            '  "settings": {' \
            '    "framework": null,' \
            '    "buildCommand": null,' \
            '    "outputDirectory": "out"' \
            '  }' \
            '}' > .vercel/project.json

      - name: Package static output for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r out/. .vercel/output/static/
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('vercel.json','utf8'));
            const routes = [];
            for (const r of v.rewrites || []) {
              routes.push({ src: r.source, dest: r.destination });
            }
            for (const r of v.redirects || []) {
              routes.push({ src: r.source, dest: r.destination, status: r.permanent ? 308 : 307 });
            }
            routes.push({ handle: 'filesystem' });
            fs.writeFileSync('.vercel/output/config.json', JSON.stringify({ version: 3, routes }, null, 2));
          "
          test -f .vercel/output/static/admin/ai/index.html

      - name: Deploy prebuilt static site to Vercel Production
        run: vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment URL
        run: echo "Deployed to https://vauto-chi.vercel.app"
