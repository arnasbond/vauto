name: Deploy to Vercel

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime config from secrets
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Lint
        run: npm run lint

      - name: Production build (with API URL)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com

      - name: Verify runtime config
        run: |
          test -f public/runtime-config.json
          grep -q vauto-api.onrender.com public/runtime-config.json
          test -f out/admin/ai/index.html
          echo "Build OK — out/admin/ai/index.html exists"

      - name: Verify Render API health
        run: npm run verify:health
        continue-on-error: true

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          github-comment: false

      - name: Deployment URL
        run: echo "Live at https://vauto-chi.vercel.app"
