name: API health check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify production readiness
        run: node scripts/verify-health.mjs --strict-readiness

      - name: Live API listing smoke (OTP + all categories)
        run: node scripts/api-listing-smoke.mjs
