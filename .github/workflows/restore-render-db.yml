name: Restore Render DB

on:
  workflow_dispatch:
    inputs:
      plan:
        description: "Render Postgres plan (basic_256mb recommended)"
        required: false
        default: "basic_256mb"

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade expired Postgres and redeploy API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d8q3fk6q1p3s739fd9h0
          RENDER_POSTGRES_PLAN: ${{ github.event.inputs.plan || 'basic_256mb' }}
        run: node scripts/restore-render-db.mjs

      - name: Wait for API health
        run: |
          for i in $(seq 1 36); do
            BODY=$(curl -sf "https://vauto-api.onrender.com/api/health" || true)
            echo "Attempt $i/36: ${BODY:0:220}"
            if echo "$BODY" | grep -q '"ok":true'; then
              echo "API healthy"
              exit 0
            fi
            sleep 15
          done
          echo "API health timed out"
          exit 1

      - name: Verify AI health
        run: |
          for i in $(seq 1 12); do
            BODY=$(curl -sf "https://vauto-api.onrender.com/api/ai/health" || true)
            echo "AI health: ${BODY:0:220}"
            if echo "$BODY" | grep -q '"gemini":true\|"provider":"gemini"'; then
              exit 0
            fi
            sleep 10
          done
          exit 1
