name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        env:
          CAPACITOR_USE_REMOTE: "1"
          CAPACITOR_REMOTE_URL: https://vauto-chi.vercel.app
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build unsigned iOS archive
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_STYLE=Manual \
            DEVELOPMENT_TEAM=""

      - name: Package IPA from archive
        working-directory: ios/App
        run: |
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r ../vauto.ipa Payload
          rm -rf Payload

      - name: Package xcarchive zip
        working-directory: ios/App
        run: zip -r ../../vauto.xcarchive.zip build/App.xcarchive

      - name: Delete previous ios-latest release
        continue-on-error: true
        run: gh release delete ios-latest --yes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish iOS package to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: Vauto iOS (iPhone)
          body: |
            Atsisiųskite **vauto.ipa** ir įdiekite iPhone įrenginyje.

            > **Pastaba:** Šis IPA failas surinktas CI be Apple Developer pasirašymo.
            > Įdiegimui iPhone reikės TestFlight, Xcode arba patikimo sideload įrankio.

            1. Atsisiųskite failą žemiau
            2. Įdiekite per Xcode, TestFlight arba sideload įrankį
            3. Paleiskite programėlę „Vauto“
          files: |
            vauto.ipa
            vauto.xcarchive.zip

      - uses: actions/upload-artifact@v4
        with:
          name: vauto-ios
          path: |
            vauto.ipa
            vauto.xcarchive.zip
          retention-days: 30
