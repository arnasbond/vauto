name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install server dependencies
        run: npm run server:install

      - name: Build server
        run: npm run server:build

      - name: Server validation smoke
        run: node scripts/validation-smoke.mjs

      - name: Auth E2E offline checks
        run: npm run test:auth-e2e

      - name: Conductor kill-switch drill
        run: node scripts/conductor-kill-switch-drill.mjs

      - name: Catalog audit
        run: npm run audit:catalog

      - name: Fast search validation
        run: npm run validate:fast-search

  api-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Live API health + listing smoke
        run: npm run test:api-integration
        env:
          VAUTO_API_URL: https://vauto-api.onrender.com

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Sync runtime config
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_VAUTO_CONDUCTOR: "1"

      - name: Build static export
        run: npm run build:e2e

      - name: Run E2E smoke tests
        run: npx playwright test e2e/smoke.spec.ts
        env:
          CI: "true"

      - name: Run auth ops guard E2E
        run: npx playwright test e2e/auth.spec.ts
        env:
          CI: "true"

      - name: Run conductor runtime-config E2E (mocked override)
        run: npx playwright test e2e/ai-conductor-runtime.spec.ts
        env:
          CI: "true"

      - name: Run conductor runtime-config E2E (live baked file)
        run: npx playwright test e2e/ai-conductor-runtime-live.spec.ts
        env:
          CI: "true"

      - name: Run conductor disabled legacy E2E
        run: npx playwright test e2e/ai-conductor-off.spec.ts
        env:
          CI: "true"

      - name: Run conductor E2E (NEXT_PUBLIC_VAUTO_CONDUCTOR=1)
        run: npm run test:e2e:conductor
        env:
          CI: "true"
