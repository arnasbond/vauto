name: Android APK Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync runtime config
        run: npm run sync:runtime-config
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_VAUTO_CONDUCTOR: "1"

      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://vauto-api.onrender.com
          NEXT_PUBLIC_VAUTO_CONDUCTOR: "1"

      - name: Verify static export
        run: |
          test -f out/index.html
          test -f out/runtime-config.json
          grep -q vauto-api.onrender.com out/runtime-config.json
          echo "Static export OK ($(find out -type f | wc -l) files)"

      - name: Generate app icons and splash screens
        run: npm run cap:assets

      - name: Sync Capacitor Android (production shell)
        run: npx cap sync android
        env:
          CAPACITOR_USE_REMOTE: "1"
          CAPACITOR_REMOTE_URL: https://www.vauto.lt

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Read APK version
        id: appver
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          CODE=$(grep 'versionCode' android/app/build.gradle | head -1 | awk '{print $2}')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk vauto.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk vauto-debug.apk
          ls -lh vauto.apk

      - name: Delete previous android-latest release
        continue-on-error: true
        run: gh release delete android-latest --yes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: VAUTO Android APK v${{ steps.appver.outputs.version }}
          body: |
            **v${{ steps.appver.outputs.version }}** (versionCode ${{ steps.appver.outputs.code }}, commit `${{ steps.appver.outputs.sha }}`)

            ## Atsisiuntimas telefone

            **Tiesioginė nuoroda:**
            https://github.com/${{ github.repository }}/releases/download/android-latest/vauto.apk

            **Per svetainę (rekomenduojama):**
            https://www.vauto.lt/download/vauto.apk

            ## Diegimas

            1. Atidarykite nuorodą telefone ir atsisiųskite **vauto.apk**
            2. Ištrinkite senesnę VAUTO versiją (jei įdiegta)
            3. Atidarykite APK ir paspauskite **Įdiegti**
            4. Leiskite diegimą iš nežinomų šaltinių, jei sistema prašo

            _Sugeneruota automatiškai po push į `master`._
          files: |
            vauto.apk
            vauto-debug.apk
          make_latest: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vauto-apk-${{ steps.appver.outputs.version }}
          path: vauto.apk
          retention-days: 30
