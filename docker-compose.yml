services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vauto
      POSTGRES_PASSWORD: vauto
      POSTGRES_DB: vauto
    ports:
      - "5432:5432"
    volumes:
      - vauto_pg:/var/lib/postgresql/data
      - ./database/schema-lite.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  vauto_pg:
