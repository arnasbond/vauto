services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: vauto
      POSTGRES_PASSWORD: vauto
      POSTGRES_DB: vauto
    ports:
      - "5432:5432"
    volumes:
      - vauto_pg:/var/lib/postgresql/data
      - ./database/schema-lite.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://vauto:vauto@db:5432/vauto
      PORT: 4000
      SEED_DEMO_CATALOG: ${SEED_DEMO_CATALOG:-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_KEY: ${AI_KEY:-}
    depends_on:
      - db

volumes:
  vauto_pg:
